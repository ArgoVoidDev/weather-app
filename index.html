<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/responsive.css" />
    <title>SKYCAST</title>
  </head>
  <body>
    <main class="container">
      <section class="empty-screen hidden">
        <div class="search-box">
          <div class="name-box">
            <p id="logo-empty" class="skycast-logo">◈ SKYCAST</p>
            <h1 class="hero-title">Your weather, beautifully simple.</h1>
            <p>Enter a city to get started.</p>
          </div>
          <div class="search-bar">
            <div class="search-input-wrapper">
              <div class="circle-animation"></div>
              <i class="fa-solid fa-magnifying-glass"></i>
              <input
                class="search-Input"
                type="text"
                placeholder="Search for a city..."
              />
            </div>

            <p>Try: Tehran, London, Tokyo, Seattle</p>
          </div>
          <button class="btn">
            <i class="fa-solid fa-location-dot"></i>Use my location
          </button>
        </div>
      </section>

      <section class="loading-screen hidden">
        <div class="skeleton top-bar-skeleton"></div>
        <div class="weather-card">
          <div class="weather-info">
            <div class="skeleton weather-icon"></div>
            <div class="skeleton temp"></div>
            <div class="skeleton skeleton-city-name"></div>
            <div class="skeleton skeleton-description"></div>
          </div>
          <div class="right-col">
            <div class="conditions-grid">
              <div class="skeleton condition-card"></div>
              <div class="skeleton condition-card"></div>
              <div class="skeleton condition-card"></div>
              <div class="skeleton condition-card"></div>
            </div>
            <div class="forecast-row">
              <div class="skeleton forecast-card"></div>
              <div class="skeleton forecast-card"></div>
              <div class="skeleton forecast-card"></div>
              <div class="skeleton forecast-card"></div>
              <div class="skeleton forecast-card"></div>
            </div>
          </div>
        </div>
      </section>

      <section class="weather-screen hidden">
        <header class="top-bar">
          <div id="logo-weather" class="skycast-logo logo">✧ SKYCAST</div>

          <div class="search-input-wrapper">
            <i class="fa-solid fa-magnifying-glass"></i>
            <div class="circle-animation"></div>

            <input
              class="search-Input"
              type="text"
              placeholder="Search for a city..."
            />
          </div>

          <button class="btn location-btn">
            <i class="fa-solid fa-location-dot"></i>
            My location
          </button>
        </header>
        <div class="card-box">
          <div class="weather-info">
            <img
              id="weatherIcon"
              src=""
              alt="weather icon"
              width="96"
              height="96"
            />

            <div class="temperature-row">
              <h5 id="temperature"></h5>
              <div class="chenga-toggle">
                <button>°C</button>
                <button>°F</button>
              </div>
            </div>

            <div>
              <span id="cityName"></span>

              <span id="country"></span>
            </div>

            <p id="dateTime"></p>

            <h3 id="description"></h3>
            <p id="feelsLike"></p>
          </div>

          <div class="conditions">
            <h3>Conditions</h3>
            <div class="cards">
              <div class="card">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-droplets-icon lucide-droplets"
                >
                  <path
                    d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7.29 6.75 7 5.3c-.29 1.45-1.14 2.84-2.29 3.76S3 11.1 3 12.25c0 2.22 1.8 4.05 4 4.05z"
                  />
                  <path
                    d="M12.56 6.6A10.97 10.97 0 0 0 14 3.02c.5 2.5 2 4.9 4 6.5s3 3.5 3 5.5a6.98 6.98 0 0 1-11.91 4.97"
                  />
                </svg>
                <span>Humidity</span>
                <p id="humidity"></p>
              </div>
              <div class="card">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-wind-icon lucide-wind"
                >
                  <path d="M12.8 19.6A2 2 0 1 0 14 16H2" />
                  <path d="M17.5 8a2.5 2.5 0 1 1 2 4H2" />
                  <path d="M9.8 4.4A2 2 0 1 1 11 8H2" />
                </svg>
                <span>Wind</span>
                <p id="wind"></p>
              </div>
              <div class="card">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-eye-icon lucide-eye"
                >
                  <path
                    d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"
                  />
                  <circle cx="12" cy="12" r="3" />
                </svg>
                <span>Visibility</span>
                <p id="visibility"></p>
              </div>
              <div class="card">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  class="lucide lucide-sun-dim-icon lucide-sun-dim"
                >
                  <circle cx="12" cy="12" r="4" />
                  <path d="M12 4h.01" />
                  <path d="M20 12h.01" />
                  <path d="M12 20h.01" />
                  <path d="M4 12h.01" />
                  <path d="M17.657 6.343h.01" />
                  <path d="M17.657 17.657h.01" />
                  <path d="M6.343 17.657h.01" />
                  <path d="M6.343 6.343h.01" />
                </svg>
                <span>UV Index</span>
                <p id="uvIndex"></p>
              </div>
            </div>
          </div>

          <div class="forecast">
            <h3>5-Day Forecast</h3>
            <div class="cards" id="forecastCards"></div>
          </div>
        </div>
      </section>

      <section class="error-screen hidden">
        <p id="logo-error" class="skycast-logo logo-name">◈ SKYCAST</p>
        <div class="error-box">
          <svg
            style="color: red"
            xmlns="http://www.w3.org/2000/svg"
            width="50"
            height="50"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            class="lucide lucide-search-alert-icon lucide-search-alert"
          >
            <circle cx="11" cy="11" r="8" />
            <path d="m21 21-4.3-4.3" />
            <path d="M11 7v4" />
            <path d="M11 15h.01" />
          </svg>
          <h3>Error</h3>
          <p id="errorCity"></p>
        </div>
        <div class="search-input-wrapper">
          <div class="circle-animation"></div>
          <i class="fa-solid fa-magnifying-glass"></i>
          <input
            class="search-Input"
            type="text"
            placeholder="Try another city..."
          />
        </div>
        <div class="suggestions">
          <h3>Suggestions</h3>
          <div class="btn-box">
            <button class="btn">London</button>
            <button class="btn">Tokyo</button>
            <button class="btn">New York</button>
          </div>
        </div>
      </section>
    </main>

    <script src="/js/config.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/storage.js"></script>
    <script src="/js/ui.js"></script>
  </body>
</html>
